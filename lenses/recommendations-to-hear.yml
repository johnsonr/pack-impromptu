# Top recommendations, each tagged with a recording you can hear now. Same SIMILAR_TO recommendations as the
# WorkRecommendations view, but each work is joined out to HAS_RECORDING (the YouTube producer) and tagged
# with the top recording's title + a watch link built from its videoId. OPTIONAL MATCH, not MATCH: show all
# recommendations, tag the ones with a recording, and float those to the top ("all recs, tag hearable ones").
id: recommendations-to-hear
name: Recommendations You Can Hear
description: Recommended works, tagged with a recording to listen to now.
spec:
  kind: cypherscript
  script: |
    const rows = await gateway.kg.query({
      cypher: `MATCH (me:AssistantUser)-[:RATED]->(rt:MusicalWorkRating) WHERE rt.rating >= 8
               MATCH (rt)-[:SIMILAR_TO]->(w:MusicalWork)
               WHERE NOT EXISTS { (me)-[:RATED]->(seen:MusicalWorkRating) WHERE seen.workId = w.workId }
               OPTIONAL MATCH (w)-[:HAS_RECORDING]->(r:MusicalRecording)
               WITH w, count(DISTINCT rt) AS overlap, collect(DISTINCT r)[0] AS rec
               RETURN w.title AS title, w.composer AS composer, w.genre AS genre, overlap,
                      rec.title AS recordingTitle, rec.channel AS recordingChannel, rec.videoId AS videoId
               ORDER BY (CASE WHEN videoId IS NULL THEN 0 ELSE 1 END) DESC, overlap DESC, w.title ASC
               LIMIT 12`,
      params: JSON.stringify({}),
    });
    const list = (rows && rows.rows) ? rows.rows : (rows || []);
    const lines = list.map((x) => {
      const head = `- **${x.title || "?"}**` + (x.composer ? ` — ${x.composer}` : "") + (x.genre ? ` · ${x.genre}` : "");
      if (x.videoId) {
        const url = "https://www.youtube.com/watch?v=" + x.videoId;
        return head + `\n  - [${x.recordingTitle || "Listen on YouTube"}](${url})` + (x.recordingChannel ? ` · ${x.recordingChannel}` : "");
      }
      return head + "\n  - _no recording found_";
    });
    await gateway.lens.present({ content: JSON.stringify({
      kind: "text",
      title: "Recommended — hearable ones tagged",
      markdown: lines.join("\n") || "Rate a few works you love and recommendations will appear here.",
    }) });
